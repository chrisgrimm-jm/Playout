<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Playout — Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sofia+Sans+Semi+Condensed:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:transparent;}
body{font-family:'Sofia Sans Semi Condensed',sans-serif;}

/* ── LOWER THIRD (host name card) ── */
#lt{
  position:fixed;left:60px;bottom:110px;z-index:5;
  display:flex;flex-direction:column;
  background:#2B283A;border-left:6px solid #E40000;
  padding:16px 30px 16px 24px;min-width:340px;
  transform:translateX(-130%);opacity:0;
  transition:transform .5s cubic-bezier(.16,1,.3,1),opacity .5s ease;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}
#lt.show{transform:translateX(0);opacity:1;}
#lt .name{font-family:'Bebas Neue',sans-serif;font-style:italic;font-size:52px;line-height:.92;
  letter-spacing:2px;color:#fff;white-space:nowrap;}
#lt .role{font-family:'DM Mono',monospace;font-weight:400;font-size:17px;letter-spacing:3px;
  text-transform:uppercase;color:#E40000;margin-top:6px;}

/* ── TOPIC / QUESTION CARD ── */
#card{
  position:fixed;left:50%;bottom:98px;transform:translateX(-50%) translateY(18px);z-index:6;
  width:min(1100px,72vw);text-align:center;opacity:0;pointer-events:none;
  transition:transform .4s cubic-bezier(.16,1,.3,1),opacity .4s ease;
}
#card.show{transform:translateX(-50%) translateY(0);opacity:1;}
#card .kind{display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:24px;
  letter-spacing:6px;color:#2B283A;background:#E40000;padding:6px 22px;border-radius:3px;margin-bottom:14px;}
#card .kind.question{background:#FCFF7A;}
#card .body{font-family:'Bebas Neue',sans-serif;font-style:italic;font-size:64px;line-height:1.02;letter-spacing:1px;
  color:#fff;text-shadow:0 6px 30px rgba(0,0,0,.7);}

/* ── TICKER (bottom bar) ── */
#bar{
  position:fixed;left:0;right:0;bottom:0;height:72px;
  display:flex;align-items:stretch;background:#2B283A;
  border-top:2px solid #E40000;z-index:8;
}
#label{
  flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:0 26px;
  font-family:'Bebas Neue',sans-serif;font-style:italic;font-size:30px;letter-spacing:4px;color:#fff;
  white-space:nowrap;z-index:3;background:#1A1823;border-right:1px solid #3A3749;
}
#label .live-dot{width:9px;height:9px;border-radius:50%;background:#E40000;
  box-shadow:0 0 10px #E40000;animation:pulse 1.6s ease-in-out infinite;}
#label span.red{color:#E40000;}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}
#bar.hidden{transform:translateY(110%);}
#bar{transition:transform .4s ease;}

#viewport{position:relative;flex:1 1 auto;overflow:hidden;background:#2B283A;}
#track{position:absolute;top:0;left:0;height:100%;white-space:nowrap;will-change:transform;}
.item{display:inline-flex;align-items:center;height:72px;font-family:'Sofia Sans Semi Condensed',sans-serif;
  font-weight:500;font-size:27px;letter-spacing:.3px;color:#fff;vertical-align:top;}
.item .tag{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;
  color:#2B283A;background:#E40000;padding:4px 12px;margin-right:16px;border-radius:2px;}
.item.fresh .txt{color:#fff;}
.sep{color:#E40000;font-size:14px;padding:0 30px;}
#viewport::before,#viewport::after{content:"";position:absolute;top:0;bottom:0;width:50px;z-index:2;pointer-events:none;}
#viewport::before{left:0;background:linear-gradient(90deg,#2B283A,transparent);}
#viewport::after{right:0;background:linear-gradient(270deg,#2B283A,transparent);}

#conn{position:fixed;top:4px;left:4px;width:6px;height:6px;border-radius:50%;
  background:#555;z-index:9;opacity:.5;}
#conn.ok{background:#00B13C;}#conn.err{background:#E40000;}
</style>
</head>
<body>
<div id="conn" title="firebase connection"></div>

<div id="lt"><div class="name"></div><div class="role"></div></div>

<div id="card"><div class="kind"></div><div class="body"></div></div>

<div id="bar">
  <div id="label"><span class="live-dot"></span><span>THE SHOW</span></div>
  <div id="viewport"><div id="track"></div></div>
</div>

<script>
// ── Firebase (shared house project) ──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBG2PS2muH4i27HefuLeBnZWW-TZ5dkMCw",
  authDomain: "pinpoint-abf21.firebaseapp.com",
  databaseURL: "https://pinpoint-abf21-default-rtdb.firebaseio.com",
  projectId: "pinpoint-abf21",
  storageBucket: "pinpoint-abf21.firebasestorage.app",
  messagingSenderId: "947703489099",
  appId: "1:947703489099:web:c4ed96cfbaeeda594463ce"
};
firebase.initializeApp(FIREBASE_CONFIG);
const _db = firebase.database();
function fbKey(topic){ return topic.trim().replace(/[.#$\[\]\/\s]+/g, '-'); }
function fbRef(topic){ return _db.ref('podcast/' + fbKey(topic) + '/state'); }

const DEFAULT_TOPIC = 'jomboy-podcast';
const params = new URLSearchParams(location.search);
const TOPIC  = params.get('topic') || DEFAULT_TOPIC;

const conn     = document.getElementById('conn');
const labelEl  = document.querySelector('#label span:last-child');
const viewport = document.getElementById('viewport');
const track    = document.getElementById('track');
const ltEl     = document.getElementById('lt');
const cardEl   = document.getElementById('card');
const barEl    = document.getElementById('bar');

// ── ticker scroll state ──
let messages = [], seen = new Set(), pending = [], rotPtr = 0;
let speed = 90, offset = 0, last = null, lastTs = 0;
const pageStart = performance.now();
const SEP = '◆';

function applyState(state){
  if(!state || typeof state !== 'object') return;
  if(!state.ts || state.ts <= lastTs) return;
  lastTs = state.ts;

  // ── lower third ──
  const lt = state.lt || {};
  ltEl.querySelector('.name').textContent = lt.name || '';
  ltEl.querySelector('.role').textContent = lt.role || '';
  ltEl.classList.toggle('show', !!lt.show && !!(lt.name||lt.role));

  // ── topic/question card ──
  const card = state.card || {};
  const kindEl = cardEl.querySelector('.kind');
  kindEl.textContent = card.kind || 'TOPIC';
  kindEl.classList.toggle('question', (card.kind||'').toUpperCase()==='QUESTION');
  cardEl.querySelector('.body').textContent = card.text || '';
  cardEl.classList.toggle('show', !!card.show && !!card.text);

  // ── ticker ──
  const tk = state.ticker || {};
  barEl.classList.toggle('hidden', tk.show === false);
  if(typeof tk.label === 'string' && tk.label) labelEl.innerHTML = tk.label;
  if(Number.isFinite(tk.speed)) speed = tk.speed;
  const norm = x => { if(!x) return []; if(!Array.isArray(x)) x = Object.values(x); return x.filter(Boolean); };
  const manual = norm(tk.items), feed = norm(tk.feedItems);
  messages = tk.mix ? weave(manual, feed) : [...manual, ...feed];

  const ids = new Set(messages.map(m => m.id));
  const settled = (performance.now() - pageStart) > 2000;
  for(const m of messages){ if(!seen.has(m.id)){ seen.add(m.id); if(settled) pending.push(m.id); } }
  for(const id of [...seen]) if(!ids.has(id)) seen.delete(id);
}

_db.ref('.info/connected').on('value', s => { conn.className = s.val() ? 'ok' : 'err'; });
fbRef(TOPIC).on('value', snap => applyState(snap.val()));

function weave(a, b){
  if(!a.length) return b.slice(); if(!b.length) return a.slice();
  const out = []; let ai = 0, bi = 0; const total = a.length + b.length;
  for(let i = 0; i < total; i++){
    if(ai/a.length <= bi/b.length) out.push(a[ai++]); else out.push(b[bi++]);
    if(ai >= a.length){ while(bi < b.length) out.push(b[bi++]); break; }
    if(bi >= b.length){ while(ai < a.length) out.push(a[ai++]); break; }
  }
  return out;
}

// ── seamless scroll engine (never reloads) ──
function findMsg(id){ return messages.find(m => m.id === id); }
function nextMessage(){
  while(pending.length){ const m = findMsg(pending.shift()); if(m) return {m, fresh:true}; }
  if(messages.length === 0) return null;
  rotPtr = rotPtr % messages.length;
  return {m: messages[rotPtr++], fresh:false};
}
function spawn(){
  const next = nextMessage(); if(!next) return false;
  const el = document.createElement('span');
  el.className = 'item' + (next.fresh ? ' fresh' : '');
  const tag = next.m.tag ? `<span class="tag"></span>` : '';
  el.innerHTML = `<span class="sep">${SEP}</span>${tag}<span class="txt"></span>`;
  el.querySelector('.txt').textContent = next.m.text;
  if(next.m.tag) el.querySelector('.tag').textContent = next.m.tag;
  track.appendChild(el); return true;
}
function needSpawn(){
  if(messages.length === 0) return false;
  const lastEl = track.lastChild; if(!lastEl) return true;
  return (lastEl.offsetLeft + lastEl.offsetWidth + offset) < viewport.clientWidth + 300;
}
function frame(t){
  if(last === null) last = t;
  const dt = Math.min((t - last)/1000, 0.05); last = t;
  if(track.firstChild) offset -= speed * dt; else offset = 0;
  while(track.firstChild){
    const c = track.firstChild;
    if(c.offsetLeft + c.offsetWidth + offset < -5){ offset += c.offsetWidth; track.removeChild(c); }
    else break;
  }
  let safety = 0;
  while(needSpawn() && safety++ < 50){ if(!spawn()) break; }
  track.style.transform = `translateX(${offset}px)`;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
