<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Playout — Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:transparent;}
body{font-family:'Sofia Sans Condensed',sans-serif;}

/* ── FULL-WIDTH TITLE BAR (locked to bottom of the 1920×1080 stage) ── */
#bar{
  position:fixed;left:0;right:0;bottom:0;height:84px;z-index:5;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  background:#14284D;                          /* deep navy */
  border-top:2px solid rgba(255,255,255,.10);  /* subtle top highlight */
  box-shadow:0 -6px 30px rgba(0,0,0,.45);
  transform:translateY(110%);                  /* hidden by default */
  transition:transform .45s cubic-bezier(.16,1,.3,1);
}
#bar.show{transform:translateY(0);}
#barText{
  white-space:nowrap;color:#fff;text-transform:uppercase;
  font-weight:800;font-size:48px;letter-spacing:.5px;line-height:1;
  padding:0 1.667em;transform-origin:center;
}
#barText .date{font-weight:700;}
#barText .pipe{display:inline-block;margin:0 .5em;color:inherit;opacity:.45;font-weight:600;transform:translateY(-2px);}
#barText .title{font-weight:800;}

#conn{position:fixed;top:4px;left:4px;width:6px;height:6px;border-radius:50%;
  background:#555;z-index:9;opacity:.5;}
#conn.ok{background:#00B13C;}#conn.err{background:#E40000;}
</style>
</head>
<body>
<div id="conn" title="firebase connection"></div>

<div id="bar"><div id="barText"><span class="date"></span><span class="pipe">|</span><span class="title"></span></div></div>

<script>
// ── Firebase (shared house project) ──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBG2PS2muH4i27HefuLeBnZWW-TZ5dkMCw",
  authDomain: "pinpoint-abf21.firebaseapp.com",
  databaseURL: "https://pinpoint-abf21-default-rtdb.firebaseio.com",
  projectId: "pinpoint-abf21",
  storageBucket: "pinpoint-abf21.firebasestorage.app",
  messagingSenderId: "947703489099",
  appId: "1:947703489099:web:c4ed96cfbaeeda594463ce"
};
firebase.initializeApp(FIREBASE_CONFIG);
const _db = firebase.database();
function fbKey(topic){ return topic.trim().replace(/[.#$\[\]\/\s]+/g, '-'); }
function fbRef(topic){ return _db.ref('podcast/' + fbKey(topic) + '/state'); }

const DEFAULT_TOPIC = 'jomboy-podcast';
const params = new URLSearchParams(location.search);
const TOPIC  = params.get('topic') || DEFAULT_TOPIC;

const conn    = document.getElementById('conn');
const barEl   = document.getElementById('bar');
const textEl  = document.getElementById('barText');
const dateEl  = textEl.querySelector('.date');
const pipeEl  = textEl.querySelector('.pipe');
const titleEl = textEl.querySelector('.title');
let lastTs = 0;

// Shrink the text to fit the 1920 stage if a title runs long.
function fit(){
  textEl.style.transform = 'scale(1)';
  const avail = 1920, w = textEl.scrollWidth;
  if(w > avail) textEl.style.transform = 'scale(' + (avail / w) + ')';
}

function applyState(state){
  if(!state || typeof state !== 'object') return;
  if(!state.ts || state.ts <= lastTs) return;
  lastTs = state.ts;

  const b = state.bar || {};
  const date = (b.date || '').trim(), title = (b.title || '').trim();
  dateEl.textContent = date;
  titleEl.textContent = title;
  pipeEl.style.display = (date && title) ? '' : 'none';
  barEl.style.background = b.bg || '#14284D';
  textEl.style.color     = b.fg || '#FFFFFF';
  const size = Number.isFinite(b.size) ? b.size : 1;
  barEl.style.height    = (84 * size) + 'px';
  textEl.style.fontSize = (48 * size) + 'px';
  fit();
  barEl.classList.toggle('show', !!b.show && !!(date || title));
}

_db.ref('.info/connected').on('value', s => { conn.className = s.val() ? 'ok' : 'err'; });
fbRef(TOPIC).on('value', snap => applyState(snap.val()));
</script>
</body>
</html>
