<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Playout — Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#15171c; --card:#1d2027; --input:#14161b; --line:#2a2e36; --line-strong:#3a3f4a;
  --ink:#e6e8ec; --muted:#9aa2b0; --subtle:#6d7480;
  --primary:#e8eaee; --primary-ink:#15171c;
  --accent:#3b82f6; --accent-soft:rgba(59,130,246,.18);
  --ok-bg:rgba(34,197,94,.16); --ok-ink:#5cd07f;
  --navy:#14284D; --red:#E40000;
}
html,body{min-height:100%;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;}
body{padding:32px 20px 64px;}
.wrap{max-width:760px;margin:0 auto;}
.logo{font-size:20px;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
.logo span{color:var(--red);}
.sub{font-size:12px;color:var(--muted);margin:6px 0 26px;display:flex;align-items:center;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:16px;
  box-shadow:0 1px 2px rgba(16,24,40,.04);}
.card-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;}
.live-pill{font-size:11px;font-weight:600;letter-spacing:.02em;padding:3px 10px;border-radius:999px;
  background:#262a32;color:var(--muted);}
.live-pill.on{background:var(--ok-bg);color:var(--ok-ink);}
label{display:block;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
textarea,input[type=text]{width:100%;background:var(--input);color:var(--ink);border:1px solid var(--line-strong);border-radius:9px;
  padding:11px 13px;font-size:15px;font-family:inherit;resize:vertical;}
textarea::placeholder,input::placeholder{color:var(--subtle);}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.row{display:flex;gap:10px;align-items:center;margin-top:14px;}
.two{display:flex;gap:12px;}.two>div{flex:1;}
.date-field{display:flex;gap:8px;}
.date-field input{flex:1;}
.grow{flex:1;}
button{border:none;border-radius:9px;padding:10px 18px;font-family:inherit;
  font-size:14px;font-weight:600;cursor:pointer;color:var(--primary-ink);background:var(--primary);}
button:hover{filter:brightness(1.08);}
button.ghost{background:var(--card);border:1px solid var(--line-strong);color:var(--muted);font-weight:500;padding:8px 14px;}
button.ghost:hover{border-color:var(--subtle);filter:none;}
button.red{background:var(--red);color:#fff;}
button.hide{background:#262a32;color:var(--muted);}
.hint{font-size:12px;color:var(--subtle);line-height:1.4;}

/* ── live WYSIWYG preview of the 1920×1080 stage ── */
.stagewrap{position:relative;width:100%;aspect-ratio:16/9;margin-top:8px;overflow:hidden;
  background:#0c0e12;border:1px solid var(--line-strong);border-radius:8px;
  background-image:linear-gradient(#161a21 1px,transparent 1px),linear-gradient(90deg,#161a21 1px,transparent 1px);background-size:32px 32px;}
.stage{position:absolute;top:0;left:0;width:1920px;height:1080px;transform-origin:top left;}
.pv-bar{position:absolute;left:0;right:0;bottom:0;height:84px;
  display:flex;align-items:center;justify-content:center;
  background:var(--navy);border-top:2px solid rgba(255,255,255,.10);box-shadow:0 -6px 30px rgba(0,0,0,.45);}
.pv-text{white-space:nowrap;color:#fff;text-transform:uppercase;font-family:'Sofia Sans Condensed',sans-serif;
  font-weight:800;font-size:48px;letter-spacing:.5px;line-height:1;padding:0 1.667em;transform-origin:center;}
.pv-text .date{font-weight:700;}
.pv-text .pipe{display:inline-block;margin:0 .5em;opacity:.45;font-weight:600;transform:translateY(-2px);}
.pv-text .title{font-weight:800;}

/* ── color pickers ── */
.color-field{display:flex;gap:8px;align-items:center;}
.color-field input[type=color]{width:44px;height:42px;padding:0;border:1px solid var(--line-strong);border-radius:9px;
  background:var(--input);cursor:pointer;flex:0 0 auto;}
.color-field input[type=color]::-webkit-color-swatch-wrapper{padding:4px;}
.color-field input[type=color]::-webkit-color-swatch{border:none;border-radius:5px;}
.color-field input[type=text]{flex:1;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;text-transform:uppercase;letter-spacing:.5px;}

.settings{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
.settings .field{flex:1;min-width:200px;}
.urlbox{display:flex;gap:8px;margin-top:6px;}
.urlbox input{font-size:13px;color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);
  background:#2a2e36;color:var(--ink);font-size:14px;font-weight:600;border:1px solid var(--line-strong);
  padding:11px 22px;border-radius:999px;box-shadow:0 10px 30px rgba(0,0,0,.4);transition:transform .25s ease;z-index:50;}
.toast.show{transform:translateX(-50%) translateY(0);}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--subtle);margin-right:7px;vertical-align:middle;}
.dot.ok{background:#16a34a;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">PLAY<span>OUT</span> — TITLE BAR</div>
  <div class="sub"><span class="dot" id="netdot"></span><span id="netmsg">Connecting to Firebase…</span></div>

  <!-- ── TITLE BAR ── -->
  <div class="card">
    <div class="card-title">Title Bar <span class="live-pill" id="barPill">Hidden</span></div>
    <div class="two">
      <div>
        <label for="dateText">Date</label>
        <div class="date-field">
          <input type="text" id="dateText" placeholder="July 7, 2026"/>
          <button class="ghost" id="todayBtn" title="Insert today's date">Today</button>
        </div>
      </div>
      <div><label for="titleText">Episode title</label><input type="text" id="titleText" placeholder="Trade Deadline Preview"/></div>
    </div>

    <div class="two" style="margin-top:16px;">
      <div>
        <label for="bgHex">Bar color</label>
        <div class="color-field">
          <input type="color" id="bgColor" value="#14284D"/>
          <input type="text" id="bgHex" value="#14284D" maxlength="7" spellcheck="false"/>
        </div>
      </div>
      <div>
        <label for="fgHex">Text color</label>
        <div class="color-field">
          <input type="color" id="fgColor" value="#FFFFFF"/>
          <input type="text" id="fgHex" value="#FFFFFF" maxlength="7" spellcheck="false"/>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:8px;justify-content:flex-end;">
      <button class="ghost" id="colorReset">Reset colors</button>
    </div>

    <label style="margin-top:16px;">Size</label>
    <div class="row" style="margin-top:0;">
      <span class="hint" style="min-width:36px;">Small</span>
      <input type="range" id="size" min="0.6" max="1.6" step="0.05" value="1" style="flex:1;" />
      <span class="hint" style="min-width:32px;">Large</span>
      <span class="hint" id="sizeVal" style="min-width:44px;text-align:right;">100%</span>
      <button class="ghost" id="sizeReset">Reset</button>
    </div>

    <label style="margin-top:16px;">Preview</label>
    <div class="stagewrap" id="stageWrap">
      <div class="stage" id="stage">
        <div class="pv-bar"><div class="pv-text" id="pvText"><span class="date"></span><span class="pipe">|</span><span class="title"></span></div></div>
      </div>
    </div>

    <div class="row">
      <div class="grow hint">Shown all-caps as <b>DATE | TITLE</b>. Enter to put it on screen.</div>
      <button class="hide" id="barHide">HIDE</button>
      <button class="red" id="barShow">SHOW ON SCREEN ▸</button>
    </div>
  </div>

  <!-- ── EXPORT ── -->
  <div class="card">
    <div class="card-title">Export PNG</div>
    <label>Transparent PNG with the bar locked to the bottom — full 1920×1080 frame, or just the bar strip.</label>
    <div class="row">
      <div class="grow hint">Uses the date &amp; title above.</div>
      <button class="ghost" id="exportTight">Just the bar</button>
      <button class="red" id="exportFull">EXPORT 1920×1080 ▾</button>
    </div>
  </div>

  <!-- ── OBS ── -->
  <div class="card">
    <div class="card-title">OBS Browser Source URL</div>
    <label>Add ONE Browser Source in OBS with this URL (1920×1080). Keep the topic secret so nobody else can post.</label>
    <div class="urlbox"><input type="text" id="obsUrl" readonly class="grow" /><button class="red" id="copyUrl">COPY</button></div>
    <div class="settings" style="margin-top:14px;">
      <div class="field"><label>Topic (channel)</label><input type="text" id="topicInput" /></div>
      <button class="ghost" id="saveTopic">USE TOPIC</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Sent</div>
<canvas id="exportCanvas" width="1920" height="1080" style="display:none;"></canvas>

<script>
// ── Firebase (shared house project) ──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBG2PS2muH4i27HefuLeBnZWW-TZ5dkMCw",
  authDomain: "pinpoint-abf21.firebaseapp.com",
  databaseURL: "https://pinpoint-abf21-default-rtdb.firebaseio.com",
  projectId: "pinpoint-abf21",
  storageBucket: "pinpoint-abf21.firebasestorage.app",
  messagingSenderId: "947703489099",
  appId: "1:947703489099:web:c4ed96cfbaeeda594463ce"
};
firebase.initializeApp(FIREBASE_CONFIG);
const _db = firebase.database();
function fbKey(topic){ return topic.trim().replace(/[.#$\[\]\/\s]+/g, '-'); }
function fbRef(topic){ return _db.ref('podcast/' + fbKey(topic) + '/state'); }

const DEFAULT_TOPIC = 'jomboy-podcast';
const LS_KEY = 'playout_titlebar';
const $ = (id) => document.getElementById(id);
const urlParams = new URLSearchParams(location.search);
let topic = urlParams.get('topic') || localStorage.getItem('podcast_topic') || DEFAULT_TOPIC;

_db.ref('.info/connected').on('value', s => setNet(!!s.val()));

// ── operator's local state ──
const DEF_BG = '#14284D', DEF_FG = '#FFFFFF', DEF_SIZE = 1;
let state = load() || { bar: { date:'', title:'', show:false, bg:DEF_BG, fg:DEF_FG, size:DEF_SIZE } };
state.bar = state.bar || { date:'', title:'', show:false, bg:DEF_BG, fg:DEF_FG, size:DEF_SIZE };
if(!state.bar.bg) state.bar.bg = DEF_BG;
if(!state.bar.fg) state.bar.fg = DEF_FG;
if(!Number.isFinite(state.bar.size)) state.bar.size = DEF_SIZE;

function load(){
  try { const raw = localStorage.getItem(LS_KEY); if(!raw) return null;
    const s = JSON.parse(raw); if(!s.bar) return null; return s;
  } catch { return null; }
}

let _lastTs = 0;
function publish(){
  state.ts = Math.max(Date.now(), _lastTs + 1); _lastTs = state.ts;   // monotonic — never drop a same-ms update on the Display
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  render();
  fbRef(topic).set(state).catch(() => setNet(false));
}

function setNet(ok){
  $('netdot').className = 'dot' + (ok ? ' ok' : '');
  $('netmsg').textContent = ok ? `Live on Firebase • topic “${topic}”` : 'Firebase offline — check connection';
}

let toastTimer;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1300); }

// ── PREVIEW (WYSIWYG 1920×1080, scaled to fit) ──
const pvDate = $('pvText').querySelector('.date');
const pvPipe = $('pvText').querySelector('.pipe');
const pvTitle = $('pvText').querySelector('.title');
function fitText(el){ el.style.transform='scale(1)'; const w=el.scrollWidth; if(w>1920) el.style.transform='scale('+(1920/w)+')'; }
function scaleStage(){ const pv=$('stageWrap').clientWidth/1920; $('stage').style.transform='scale('+pv+')'; }
const pvBar = document.querySelector('.pv-bar');
function drawPreview(){
  const date=$('dateText').value.trim().toUpperCase(), title=$('titleText').value.trim().toUpperCase();
  pvDate.textContent=date; pvTitle.textContent=title;
  pvPipe.style.display=(date&&title)?'':'none';
  pvBar.style.background = state.bar.bg;
  $('pvText').style.color = state.bar.fg;
  const size = Number.isFinite(state.bar.size) ? state.bar.size : DEF_SIZE;
  pvBar.style.height = (84 * size) + 'px';
  $('pvText').style.fontSize = (48 * size) + 'px';
  fitText($('pvText'));
}
window.addEventListener('resize', scaleStage);

// ── SIZE ──
let _sizeT=null;
function applySize(v, publishNow){
  const s = Math.max(0.6, Math.min(1.6, parseFloat(v)||DEF_SIZE));
  state.bar.size = Math.round(s*100)/100;
  $('size').value = state.bar.size;
  $('sizeVal').textContent = Math.round(state.bar.size*100)+'%';
  drawPreview();
  if(publishNow) publish();
  else if(!_sizeT){ publish(); _sizeT=setTimeout(()=>{_sizeT=null;},120); }
}
$('size').addEventListener('input', e=>applySize(e.target.value,false));
$('size').addEventListener('change', ()=>publish());
$('sizeReset').onclick = () => { applySize(DEF_SIZE,true); toast('Size reset'); };
function syncSizeInput(){ $('size').value = state.bar.size; $('sizeVal').textContent = Math.round(state.bar.size*100)+'%'; }

// ── COLORS (hex box <-> swatch, kept in sync) ──
const HEX_RE = /^#?[0-9a-fA-F]{6}$/;
function normHex(v){ if(!v) return null; v=v.trim(); if(!v.startsWith('#')) v='#'+v; return HEX_RE.test(v) ? v.toUpperCase() : null; }
let _colorT=null;
function publishColorsSoon(){ if(_colorT) return; publish(); _colorT=setTimeout(()=>{_colorT=null;},120); }
function wireColor(which, swatchId, hexId){
  const key = which; // 'bg' | 'fg'
  const swatch=$(swatchId), hex=$(hexId);
  function apply(v, publishNow){
    const n = normHex(v); if(!n) return false;
    state.bar[key]=n; swatch.value=n; hex.value=n; drawPreview();
    if(publishNow) publish(); else publishColorsSoon();
    return true;
  }
  swatch.addEventListener('input', e=>apply(e.target.value,false));
  swatch.addEventListener('change', ()=>publish());
  hex.addEventListener('input', e=>apply(e.target.value,false));
  hex.addEventListener('blur',  e=>{ if(!apply(e.target.value,true)) e.target.value=state.bar[key]; });
  hex.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); if(!apply(e.target.value,true)) e.target.value=state.bar[key]; }});
  return { set:v=>apply(v,false) };
}
const bgCtl = wireColor('bg','bgColor','bgHex');
const fgCtl = wireColor('fg','fgColor','fgHex');
function syncColorInputs(){ bgCtl.set(state.bar.bg); fgCtl.set(state.bar.fg); }
$('colorReset').onclick = () => { state.bar.bg=DEF_BG; state.bar.fg=DEF_FG; syncColorInputs(); publish(); toast('Colors reset'); };

// ── SHOW / HIDE ──
function showBar(){
  state.bar = Object.assign({}, state.bar, {
    date:$('dateText').value.trim(), title:$('titleText').value.trim(), show:true });
  publish(); toast('On screen ▸');
}
$('barShow').onclick = showBar;
$('barHide').onclick = () => { state.bar.show = false; publish(); toast('Title bar hidden'); };
['dateText','titleText'].forEach(id => {
  $(id).addEventListener('input', drawPreview);
  $(id).addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); showBar(); } });
});
$('todayBtn').onclick = () => {
  const d = new Date();
  $('dateText').value = d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  drawPreview();
};

function render(){
  $('barPill').className = 'live-pill' + (state.bar.show ? ' on' : '');
  $('barPill').textContent = state.bar.show ? 'On screen' : 'Hidden';
  drawPreview();
  updateUrl();
}
function updateUrl(){
  const u = new URL('Playout_Display.html', location.href);
  u.searchParams.set('topic', topic);
  $('obsUrl').value = u.href;
  if(document.activeElement!==$('topicInput')) $('topicInput').value = topic;
}
$('copyUrl').onclick=()=>{ $('obsUrl').select(); navigator.clipboard.writeText($('obsUrl').value); toast('URL copied'); };
$('saveTopic').onclick=()=>{ const t=$('topicInput').value.trim(); if(!t) return;
  topic=t; localStorage.setItem('podcast_topic', topic); updateUrl(); publish(); toast('Topic set'); };

// ── PNG EXPORT — mirrors Playout_Display.html exactly ──
const BAR = { h:84, fontSize:48, ls:.5, pad:80, pipeGap:24, pipeAlpha:.45 };
// #RRGGBB + alpha 0..1 → rgba() string
function rgba(hex, a){ const n=hex.replace('#',''); const r=parseInt(n.slice(0,2),16),g=parseInt(n.slice(2,4),16),b=parseInt(n.slice(4,6),16); return `rgba(${r},${g},${b},${a})`; }
function segFont(size){ return `800 ${size}px 'Sofia Sans Condensed', sans-serif`; }
function barSize(){ return Number.isFinite(state.bar.size) ? state.bar.size : DEF_SIZE; }
function barHeight(){ return BAR.h * barSize(); }
function measureLine(ctx, date, title, size, pipeGap){
  ctx.font = segFont(size); if('letterSpacing' in ctx) ctx.letterSpacing = BAR.ls+'px';
  const dW = date ? ctx.measureText(date).width : 0;
  const tW = title ? ctx.measureText(title).width : 0;
  ctx.font = `600 ${size}px 'Sofia Sans Condensed', sans-serif`;
  const pW = (date && title) ? ctx.measureText('|').width : 0;
  if('letterSpacing' in ctx) ctx.letterSpacing = '0px';
  const gaps = (date && title) ? pipeGap*2 : 0;
  return { dW, tW, pW, total: dW + gaps + pW, size, pipeGap };
}
function drawBar(ctx, W, barTop, date, title){
  const bg = state.bar.bg || DEF_BG, fg = state.bar.fg || DEF_FG;
  const size = barSize(), h = BAR.h*size, pad = BAR.pad*size;
  // bar + subtle top highlight
  ctx.fillStyle = bg; ctx.fillRect(0, barTop, W, h);
  ctx.fillStyle = 'rgba(255,255,255,.10)'; ctx.fillRect(0, barTop, W, 2);
  // fit
  let m = measureLine(ctx, date, title, BAR.fontSize*size, BAR.pipeGap*size);
  const avail = W - pad*2;
  if(m.total > avail){ const f = avail/m.total; m = measureLine(ctx, date, title, BAR.fontSize*size*f, BAR.pipeGap*size*f); }
  // draw centered
  const cy = barTop + h/2;
  let x = (W - m.total)/2;
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  if('letterSpacing' in ctx) ctx.letterSpacing = BAR.ls+'px';
  if(date){ ctx.font = `700 ${m.size}px 'Sofia Sans Condensed', sans-serif`; ctx.fillStyle = fg;
    ctx.fillText(date, x, cy); x += m.dW; }
  if(date && title){ x += m.pipeGap; if('letterSpacing' in ctx) ctx.letterSpacing='0px';
    ctx.font = `600 ${m.size}px 'Sofia Sans Condensed', sans-serif`;
    ctx.fillStyle = rgba(fg, BAR.pipeAlpha); ctx.fillText('|', x, cy - 2*size);
    x += m.pW + m.pipeGap; if('letterSpacing' in ctx) ctx.letterSpacing=BAR.ls+'px'; }
  if(title){ ctx.font = segFont(m.size); ctx.fillStyle = fg; ctx.fillText(title, x, cy); }
  if('letterSpacing' in ctx) ctx.letterSpacing='0px';
}
function slug(s){ return (s||'title-bar').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40) || 'title-bar'; }

async function exportPng(mode){
  const date = $('dateText').value.trim().toUpperCase(), title = $('titleText').value.trim().toUpperCase();
  if(!date && !title){ toast('Add a date or title first'); return; }
  try { if(document.fonts && document.fonts.ready) await document.fonts.ready; } catch {}
  const canvas = $('exportCanvas'), ctx = canvas.getContext('2d');
  if(mode === 'tight'){
    canvas.width = 1920; canvas.height = Math.round(barHeight());
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBar(ctx, 1920, 0, date, title);
  } else {
    canvas.width = 1920; canvas.height = 1080;
    ctx.clearRect(0,0,1920,1080);
    drawBar(ctx, 1920, 1080 - barHeight(), date, title);
  }
  const url = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url; a.download = 'playout-' + slug(title || date) + (mode==='tight'?'-bar':'') + '.png';
  document.body.appendChild(a); a.click(); a.remove();
  toast('PNG exported');
}
$('exportFull').onclick  = () => exportPng('full');
$('exportTight').onclick = () => exportPng('tight');

// ── init ──
$('dateText').value  = state.bar.date  || '';
$('titleText').value = state.bar.title || '';
syncColorInputs(); syncSizeInput(); scaleStage(); render();

// A fresh browser must not overwrite what's live on air. Adopt newer remote snapshot, then publish.
fbRef(topic).once('value').then(snap => {
  const r = snap.val();
  if(r && r.ts && r.ts > (state.ts || 0) && r.bar){
    state.bar = Object.assign({ date:'', title:'', show:false, bg:DEF_BG, fg:DEF_FG, size:DEF_SIZE }, r.bar);
    if(!state.bar.bg) state.bar.bg = DEF_BG;
    if(!state.bar.fg) state.bar.fg = DEF_FG;
    if(!Number.isFinite(state.bar.size)) state.bar.size = DEF_SIZE;
    $('dateText').value  = state.bar.date  || '';
    $('titleText').value = state.bar.title || '';
    syncColorInputs(); syncSizeInput(); render();
  }
  publish();
}).catch(() => publish());
</script>
</body>
</html>
